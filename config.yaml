# Configuration for Phase 1-4 Implementation

# Project Settings
project:
  name: "LLM Document Processing System"
  version: "1.0.0"
  description: "Document processing, semantic search and LLM reasoning (Phase 1-4)"

# File Paths
paths:
  raw_documents: "./data/raw_documents/"
  processed_data: "./data/processed/"
  vector_db: "./data/vector_db/chroma_db/"
  
# Document Processing Settings
document_processing:
  supported_formats: [".pdf", ".docx", ".eml", ".txt"]
  # chunking controls (new)
  chunk_method: "clause"       # options: sentence, paragraph, hybrid, clause
  chunk_size: 200               # max words per chunk (clause mode: only splits if clause exceeds this)
  chunk_overlap: 1              # sentences of overlap (only applies when clause is split further)
  max_file_size_mb: 50
  
  # Text cleaning patterns
  cleaning_patterns:
    remove_headers: true
    remove_footers: true
    normalize_whitespace: true
    preserve_medical_terms: true

# Embedding Settings  
embeddings:
  model_name: "BAAI/bge-large-en-v1.5"
  batch_size: 32
  normalize: true
  instruction_prefix: "Represent this document for retrieval: "
  query_instruction_prefix: "Represent this question for searching relevant passages: "

# Vector Database
vector_db:
  provider: "chromadb"
  collection_name: "document_chunks"
  similarity_metric: "cosine"
  persist_directory: "./data/vector_db/chroma_db/"

# Semantic Search
semantic_search:
  top_k: 7
  similarity_threshold: 0.0   # lowered for demo, accept all results
  rerank: false
  reranker_model: "cross-encoder/ms-marco-MiniLM-L-6-v2"

# Phase 3 - LLM Reasoning
llm:
  provider: "huggingface"
  model: "Qwen/Qwen2.5-72B-Instruct"
  hf_token: ""  # set HF_TOKEN in .env instead
  temperature: 0.0
  max_tokens: 512
  context_token_limit: 3000

# API Settings (Phase 4)
api:
  host: "0.0.0.0"
  port: 8000
  reload: false
  workers: 1

# Performance
performance:
  cache_embeddings: true
  cache_ttl: 3600  # seconds
  enable_gpu: true
  max_batch_size: 32
